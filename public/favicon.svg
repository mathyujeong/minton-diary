  <rect width="512" height="512" rx="128" fill="#111111" />
  
  <!-- Subtle athletic grid lines or slash accent -->
  <path d="M0 400 L512 100" stroke="#222222" stroke-width="24" />
  
  <!-- Nike Athletic Editorial Typography 'MD' -->
  <text x="256" y="345" font-family="'Anton', 'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-size="280" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-5">MD</text>
  
  <!-- Iconic Sale-Red Live Dot / Shuttlecock Accent -->
