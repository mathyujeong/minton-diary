<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Yonex / BWF International Tournament Court Green Gradient -->
    <linearGradient id="courtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00964e" />
      <stop offset="100%" stop-color="#005e30" />
    </linearGradient>

    <!-- Athletic Drop Shadow for MD Typography -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#002410" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- 1. Rich Badminton Court Mat Background -->
  <rect width="512" height="512" rx="115" fill="url(#courtGrad)" />

  <!-- 2. Authentic Badminton Court Boundary Lines (Corner / End Lines) -->
  <g stroke="#ffffff" stroke-width="18" stroke-linecap="square" opacity="0.85">
    <!-- Baseline (Bottom boundary line) -->
    <line x1="0" y1="420" x2="450" y2="420" />
    
    <!-- Doubles Side Line (Right outer boundary line) -->
    <line x1="450" y1="0" x2="450" y2="420" />
    
    <!-- Doubles Rear Service Line (Inner back line) -->
    <line x1="0" y1="340" x2="450" y2="340" />
    
    <!-- Singles Side Line (Inner side line) -->
    <line x1="360" y1="0" x2="360" y2="420" />
    
    <!-- Center Service Line (Dividing line from top down to rear service line) -->
    <line x1="180" y1="0" x2="180" y2="340" />
  </g>

  <!-- Subtle Court Green Corner Tape Mark -->
  <circle cx="450" cy="420" r="10" fill="#ffffff" />

  <!-- 3. Bold Athletic Editorial Typography 'MD' (In front of court lines) -->
  <g filter="url(#shadow)">
    <text x="210" y="315" font-family="'Anton', 'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-size="260" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-6">MD</text>
  </g>

  <!-- 4. Yonex Yellow / Shuttlecock Accent Dot -->
  <circle cx="365" cy="145" r="28" fill="#ffdf00" filter="url(#shadow)" />
</svg>